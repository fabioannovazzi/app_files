<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Example Brand Soft Blush</title>
  </head>
  <body>
    <span id="productTitle">Example Brand Soft Blush</span>
    <a id="bylineInfo" href="/stores/Example/page/ABC">Visit the Example Brand Store</a>
    <img
      id="landingImage"
      data-old-hires="https://example.com/images/hero-main.jpg"
      src="https://example.com/images/hero-main-small.jpg"
      alt="Example Brand Soft Blush"
    />

    <script type="a-state" data-a-state='{"key":"desktop-twister-sort-filter-data"}'>
      {
        "sortedDimValuesForAllDims": {
          "color_name": [
            {
              "defaultAsin": "B0TEST0001",
              "dimensionValueDisplayText": "Warm Rose",
              "dimensionValueState": "SELECTED",
              "imageAttribute": {"url": "https://example.com/images/warm-rose.jpg"}
            },
            {
              "defaultAsin": "B0TEST0002",
              "dimensionValueDisplayText": "Cool Pink",
              "dimensionValueState": "AVAILABLE",
              "imageAttribute": {"url": "https://example.com/images/cool-pink.jpg"}
            }
          ],
          "size_name": [
            {
              "defaultAsin": "B0TEST0001",
              "dimensionValueDisplayText": "0.2 Ounce (Pack of 1)",
              "dimensionValueState": "SELECTED"
            },
            {
              "defaultAsin": "B0TEST0002",
              "dimensionValueDisplayText": "0.2 Ounce (Pack of 1)",
              "dimensionValueState": "AVAILABLE"
            }
          ]
        }
      }
    </script>
  </body>
</html>
