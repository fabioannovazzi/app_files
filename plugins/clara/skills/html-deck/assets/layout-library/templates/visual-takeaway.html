      <div class="slide-frame wide clara-layout clara-layout--visual">
        <div class="eyebrow reveal" style="--i:0" data-qa-role="eyebrow">{{eyebrow}}</div>
        <h2 class="reveal" style="--i:1" data-qa-role="title">{{title}}</h2>
        <div class="clara-visual-split reveal" style="--i:2">
          <div class="clara-visual-split__visual" data-qa-role="visual">{{visual}}</div>
          <section class="clara-visual-split__takeaway" data-qa-role="takeaway">
            <span class="clara-layout__label">{{takeaway_label}}</span>
            <p>{{takeaway}}</p>
          </section>
        </div>
        <p class="source-note" data-qa-role="source">{{source_note}}</p>
      </div>
