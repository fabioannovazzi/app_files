      <div class="slide-frame narrow clara-layout clara-layout--chapter">
        <div class="eyebrow reveal" style="--i:0" data-qa-role="eyebrow">{{eyebrow}}</div>
        <div class="clara-layout__chapter-mark reveal" style="--i:1" aria-hidden="true"></div>
        <h2 class="reveal" style="--i:2" data-qa-role="title">{{title}}</h2>
        <p class="lede reveal" style="--i:3" data-qa-role="lede">{{subtitle}}</p>
        <p class="source-note" data-qa-role="source">{{source_note}}</p>
      </div>
