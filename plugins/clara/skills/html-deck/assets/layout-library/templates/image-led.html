      <div class="slide-frame wide clara-layout clara-layout--image-led">
        <div class="eyebrow reveal" style="--i:0" data-qa-role="eyebrow">{{eyebrow}}</div>
        <h2 class="reveal" style="--i:1" data-qa-role="title">{{title}}</h2>
        <div class="clara-image-led reveal" style="--i:2">
          <figure class="clara-image-led__figure" data-qa-role="visual">
            <img src="{{image_src}}" alt="{{image_alt}}">
            <figcaption>{{caption}}</figcaption>
          </figure>
          <p class="clara-image-led__takeaway" data-qa-role="takeaway">{{takeaway}}</p>
        </div>
        <p class="source-note" data-qa-role="source">{{source_note}}</p>
      </div>
