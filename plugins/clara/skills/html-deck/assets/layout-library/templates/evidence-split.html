      <div class="slide-frame wide clara-layout clara-layout--evidence-split">
        <div class="eyebrow reveal" style="--i:0" data-qa-role="eyebrow">{{eyebrow}}</div>
        <h2 class="reveal" style="--i:1" data-qa-role="title">{{title}}</h2>
        <div class="clara-evidence-split reveal" style="--i:2" data-qa-role="exhibit">
          <section class="clara-evidence-split__evidence" data-qa-role="evidence">
            <span class="clara-layout__label">{{evidence_label}}</span>
            <div class="clara-evidence-list">{{evidence_items}}</div>
          </section>
          <section class="clara-evidence-split__judgement" data-qa-role="takeaway">
            <span class="clara-layout__label">{{takeaway_label}}</span>
            <p class="clara-evidence-split__takeaway">{{takeaway}}</p>
            <p class="clara-evidence-split__condition">{{condition}}</p>
          </section>
        </div>
        <p class="source-note" data-qa-role="source">{{source_note}}</p>
      </div>
