      <div class="slide-frame narrow clara-layout clara-layout--assertion">
        <div class="eyebrow reveal" style="--i:0" data-qa-role="eyebrow">{{eyebrow}}</div>
        <h2 class="reveal" style="--i:1" data-qa-role="title">{{title}}</h2>
        <p class="lede reveal" style="--i:2" data-qa-role="body">{{body}}</p>
        <div class="clara-layout__implication reveal" style="--i:3" data-qa-role="takeaway">
          <span class="clara-layout__label">{{implication_label}}</span>
          <p>{{implication}}</p>
        </div>
        <p class="source-note" data-qa-role="source">{{source_note}}</p>
      </div>
