      <div class="slide-frame wide clara-layout clara-layout--closing">
        <div class="eyebrow reveal" style="--i:0" data-qa-role="eyebrow">{{eyebrow}}</div>
        <h2 class="reveal" style="--i:1" data-qa-role="title">{{title}}</h2>
        <div class="clara-closing-actions reveal" style="--i:2" data-qa-role="exhibit">{{actions}}</div>
        <p class="clara-closing-line reveal" style="--i:3" data-qa-role="takeaway">{{closing_line}}</p>
        <p class="source-note" data-qa-role="source">{{source_note}}</p>
      </div>
