      <div class="slide-frame wide clara-layout clara-layout--cover">
        <div class="eyebrow reveal" style="--i:0" data-qa-role="eyebrow">{{eyebrow}}</div>
        <h1 class="reveal" style="--i:1" data-qa-role="title">{{title}}</h1>
        <p class="lede reveal" style="--i:2" data-qa-role="lede">{{subtitle}}</p>
        <div class="clara-layout__rule reveal" style="--i:3" aria-hidden="true"></div>
        <p class="clara-layout__author reveal" style="--i:4" data-qa-role="author">{{author}}</p>
        <p class="source-note" data-qa-role="source">{{source_note}}</p>
      </div>
