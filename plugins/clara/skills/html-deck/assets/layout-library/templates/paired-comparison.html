      <div class="slide-frame wide clara-layout clara-layout--comparison">
        <div class="eyebrow reveal" style="--i:0" data-qa-role="eyebrow">{{eyebrow}}</div>
        <h2 class="reveal" style="--i:1" data-qa-role="title">{{title}}</h2>
        <div class="clara-comparison reveal" style="--i:2" data-qa-role="exhibit">
          <section class="clara-comparison__side clara-comparison__side--quiet" data-qa-role="comparison-left">
            <span class="clara-layout__label">{{left_label}}</span>
            <h3>{{left_title}}</h3>
            <div class="clara-comparison__points">{{left_items}}</div>
          </section>
          <section class="clara-comparison__side clara-comparison__side--focus" data-qa-role="comparison-right">
            <span class="clara-layout__label">{{right_label}}</span>
            <h3>{{right_title}}</h3>
            <div class="clara-comparison__points">{{right_items}}</div>
          </section>
        </div>
        <p class="source-note" data-qa-role="source">{{source_note}}</p>
      </div>
