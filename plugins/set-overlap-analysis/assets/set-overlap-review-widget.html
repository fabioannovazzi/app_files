<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Set Overlap Review</title>
  <style>
    :root {
      color-scheme: light;
      --paper: #ffffff;
      --surface: #ffffff;
      --surface-muted: #f7f9f6;
      --surface-strong: #eef3ed;
      --soft: #f7f9f6;
      --soft-strong: #eef3ed;
      --ink: #243027;
      --text: #465148;
      --muted: #6d776f;
      --border: #dfe6dd;
      --border-strong: #cfd9d0;
      --accent: #496a60;
      --accent-strong: #263b34;
      --accent-soft: #e7eee9;
      --danger: #8f4438;
      --danger-bg: #fbf4f2;
      --warning: #7d642d;
      --warning-bg: #fbf7ee;
      --ok: #3f6b55;
      --ok-bg: #f0f7f2;
      --info: #425f72;
      --info-bg: #f1f6f8;
      --radius: 8px;
      --content: 1240px;
      --shadow: none;
    }
    * { box-sizing: border-box; }
    html, body { background: var(--paper); }
    body {
      margin: 0;
      color: var(--text);
      font-family: "Instrument Sans", "Aptos", "Segoe UI", -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 1rem;
      line-height: 1.5;
      font-kerning: normal;
      letter-spacing: 0;
      text-rendering: optimizeLegibility;
    }
    button, input, textarea, select {
      font: inherit;
      letter-spacing: 0;
    }
    button { -webkit-tap-highlight-color: transparent; }
    .app {
      min-height: 100vh;
      padding: 1.25rem;
      background: var(--paper);
    }
    .shell {
      max-width: var(--content);
      margin: 0 auto;
    }
    .topbar {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 1rem;
      padding-bottom: 1rem;
      margin-bottom: 1rem;
      border-bottom: 1px solid var(--border);
    }
    h1 {
      margin: 0 0 0.35rem;
      color: var(--ink);
      font-size: 1.35rem;
      font-weight: 650;
      line-height: 1.18;
      letter-spacing: 0;
    }
    .subtitle {
      max-width: 68ch;
      margin: 0;
      color: var(--muted);
      font-size: 0.95rem;
      line-height: 1.45;
    }
    .pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 2rem;
      max-width: 18rem;
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 0.25rem 0.75rem;
      background: var(--surface);
      color: var(--accent-strong);
      font-size: 0.78rem;
      font-weight: 650;
      line-height: 1.2;
      text-align: center;
      overflow-wrap: anywhere;
    }
    .summary {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(9.5rem, 1fr));
      gap: 0.65rem;
      margin-bottom: 1rem;
    }
    .metric {
      min-width: 0;
      min-height: 5.25rem;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0.85rem;
      background: var(--surface);
    }
    .metric span {
      display: block;
      color: var(--muted);
      font-size: 0.78rem;
      font-weight: 520;
      line-height: 1.25;
      overflow-wrap: anywhere;
    }
    .metric strong {
      display: block;
      margin-top: 0.3rem;
      color: var(--ink);
      font-size: 1.28rem;
      font-weight: 650;
      line-height: 1.18;
      letter-spacing: 0;
      overflow-wrap: anywhere;
      font-variant-numeric: tabular-nums;
    }
    .toolbar {
      display: grid;
      grid-template-columns: minmax(14rem, 1fr) auto;
      gap: 0.65rem;
      align-items: start;
      margin-bottom: 0.85rem;
    }
    .search {
      width: 100%;
      min-height: 2.75rem;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0.65rem 0.8rem;
      background: var(--surface);
      color: var(--ink);
      outline: none;
    }
    .search::placeholder { color: var(--muted); }
    .search:focus-visible,
    .tab:focus-visible,
    .row:focus-visible,
    button:focus-visible {
      outline: 2px solid var(--accent-soft);
      outline-offset: 2px;
    }
    .tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
      justify-content: flex-end;
    }
    .tab {
      min-height: 2.25rem;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0.48rem 0.7rem;
      background: var(--surface);
      color: var(--text);
      cursor: pointer;
      font-size: 0.9rem;
      line-height: 1.2;
      overflow-wrap: anywhere;
    }
    .tab:hover { background: var(--soft); }
    .tab[aria-pressed="true"] {
      border-color: var(--border-strong);
      background: var(--accent-soft);
      color: var(--accent-strong);
      font-weight: 650;
    }
    .content {
      display: grid;
      grid-template-columns: minmax(0, 1.08fr) minmax(20rem, 0.92fr);
      gap: 0.9rem;
      align-items: start;
    }
    .panel {
      min-width: 0;
      overflow: hidden;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
    }
    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.75rem;
      min-height: 3rem;
      border-bottom: 1px solid var(--border);
      padding: 0.75rem 0.9rem;
      background: var(--soft);
      color: var(--muted);
      font-size: 0.84rem;
    }
    .panel-header h2 {
      margin: 0;
      color: var(--ink);
      font-size: 0.95rem;
      font-weight: 650;
      line-height: 1.2;
      letter-spacing: 0;
    }
    .rows {
      max-height: 700px;
      overflow: auto;
    }
    .row {
      display: grid;
      grid-template-columns: minmax(7.5rem, 0.32fr) minmax(0, 1fr) minmax(6.75rem, 10rem);
      gap: 0.75rem;
      width: 100%;
      min-height: 3.75rem;
      border: 0;
      border-left: 2px solid transparent;
      border-bottom: 1px solid var(--border);
      padding: 0.72rem 0.85rem 0.72rem calc(0.85rem - 2px);
      background: var(--surface);
      color: var(--text);
      text-align: left;
      cursor: pointer;
    }
    .row:last-child { border-bottom: 0; }
    .row:hover,
    .row.is-selected {
      background: var(--soft);
    }
    .row.is-selected {
      border-left-color: var(--accent);
    }
    .type {
      color: var(--muted);
      font-size: 0.78rem;
      line-height: 1.25;
      overflow-wrap: anywhere;
    }
    .title {
      color: var(--ink);
      font-weight: 650;
      line-height: 1.3;
      overflow-wrap: anywhere;
    }
    .path {
      display: block;
      margin-top: 0.22rem;
      color: var(--muted);
      font-size: 0.78rem;
      line-height: 1.3;
      overflow-wrap: anywhere;
    }
    .action,
    .tag {
      justify-self: end;
      align-self: start;
      max-width: 10rem;
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 0.25rem 0.55rem;
      background: var(--warning-bg);
      color: var(--warning);
      font-size: 0.76rem;
      font-weight: 620;
      line-height: 1.2;
      text-align: center;
      overflow-wrap: anywhere;
    }
    .row[data-kind*="artifact"] .action,
    .row[data-kind*="source"] .action,
    .row[data-kind*="source"] .action,
    .row[data-kind*="inventory"] .action,
    .row[data-kind*="supported"] .action,
    .row[data-kind*="section"] .action,
    .row[data-kind*="table"] .action,
    .row[data-kind*="chart"] .action,
    .row[data-kind*="context"] .action,
    .row[data-kind*="field"] .action,
    .row[data-kind*="memo"] .action,
    .row[data-kind*="email"] .action,
    .row[data-kind*="prompt"] .action,
    .row[data-kind*="domain"] .action,
    .row[data-kind*="driver"] .action,
    .row[data-kind*="movement"] .action,
    .row[data-kind*="window"] .action,
    .row[data-kind*="match"] .action {
      background: var(--ok-bg);
      color: var(--ok);
    }
    .row[data-kind*="error"] .action,
    .row[data-kind*="missing"] .action,
    .row[data-kind*="mismatch"] .action,
    .row[data-kind*="unmatched"] .action,
    .row[data-kind*="issue"] .action,
    .row[data-kind*="failed"] .action,
    .row[data-kind*="anomaly"] .action,
    .row[data-kind*="warning"] .action,
    .row[data-kind*="duplicate"] .action,
    .row[data-kind*="followup"] .action {
      background: var(--danger-bg);
      color: var(--danger);
    }
    .details {
      padding: 0.95rem;
    }
    .details h3 {
      margin: 0 0 0.55rem;
      color: var(--ink);
      font-size: 1.05rem;
      font-weight: 650;
      line-height: 1.25;
      letter-spacing: 0;
      overflow-wrap: anywhere;
    }
    .details dl {
      display: grid;
      grid-template-columns: minmax(7.5rem, 0.32fr) minmax(0, 1fr);
      gap: 0.45rem 0.8rem;
      margin: 0.85rem 0;
    }
    .details dt {
      color: var(--muted);
      font-size: 0.8rem;
      line-height: 1.3;
    }
    .details dd {
      margin: 0;
      color: var(--text);
      overflow-wrap: anywhere;
    }
    h4 {
      margin: 1rem 0 0.45rem;
      color: var(--ink);
      font-size: 0.86rem;
      font-weight: 650;
      line-height: 1.25;
      letter-spacing: 0;
    }
    pre {
      max-height: 24rem;
      overflow: auto;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0.8rem;
      background: var(--soft);
      color: var(--text);
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace;
      font-size: 0.78rem;
      line-height: 1.45;
    }
    .empty {
      padding: 1.35rem;
      color: var(--muted);
    }
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        scroll-behavior: auto !important;
        transition-duration: 0.001ms !important;
        animation-duration: 0.001ms !important;
        animation-iteration-count: 1 !important;
      }
    }
    @media (max-width: 980px) {
      .content { grid-template-columns: 1fr; }
      .toolbar { grid-template-columns: 1fr; }
      .tabs { justify-content: flex-start; }
    }
    @media (max-width: 760px) {
      .app { padding: 1rem; }
      .topbar { flex-direction: column; align-items: stretch; }
      .pill { align-self: flex-start; }
      .summary { grid-template-columns: repeat(auto-fit, minmax(8.5rem, 1fr)); }
      .row { grid-template-columns: 1fr; }
      .action, .tag { justify-self: start; max-width: 100%; }
      .details dl { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main class="app">
    <div class="shell">
      <section class="topbar">
        <div>
          <h1 id="page-title">Set Overlap Review</h1>
          <p class="subtitle" id="subtitle">Loading payload...</p>
        </div>
        <span class="pill" id="status-pill">MCP widget</span>
      </section>
      <section class="summary" id="summary"></section>
      <section class="toolbar">
        <input id="search" class="search" type="search" placeholder="Search sets, intersections, pairs, charts, artifacts">
        <div class="tabs" id="tabs"></div>
      </section>
      <section class="content">
        <div class="panel">
          <div class="panel-header">
            <h2 id="items-title">Review items</h2>
            <span id="count"></span>
          </div>
          <div class="rows" id="rows"></div>
        </div>
        <div class="panel">
          <div class="panel-header">
            <h2 id="detail-title">Detail</h2>
          </div>
          <div class="details" id="details"></div>
        </div>
      </section>
    </div>
  </main>
  <script>
    const UI_COPY = {
      en: {
        pageTitle: "Set Overlap Review",
        search: "Search sets, intersections, pairs, charts, artifacts",
        itemsTitle: "Review items",
        detailTitle: "Detail",
        run: "Run",
        all: "All",
        noMatches: "No item matches the current filters.",
        selectItem: "Select a review item.",
        data: "Data",
        sourceRecords: "Source Records",
        metrics: ["Selected sets", "Items", "Intersections", "Memberships", "Charts", "Review items"],
        fields: ["Type", "Action", "Source", "Output"],
        types: {
          set_summary: "Set summary",
          overlap_intersection: "Intersection",
          pair_overlap: "Pair overlap",
          chart_artifact: "Chart",
          context_artifact: "Context",
          report_artifact: "Artifact",
          review_artifact: "Review artifact",
        },
        actions: { accept: "Accept", reject: "Reject", edit: "Edit", mark_unclear: "Mark unclear", request_more_documents: "Request more documents", skip: "Skip", review: "Review" },
        statuses: { ready_for_review: "Ready for review", needs_review: "Needs review", pending_review: "Pending review", reviewed: "Reviewed", partial_review: "Partially reviewed", empty: "Empty" },
      },
      es: {
        pageTitle: "Revisión del solapamiento de conjuntos",
        search: "Buscar conjuntos, intersecciones, pares, gráficos o artefactos",
        itemsTitle: "Elementos de revisión",
        detailTitle: "Detalle",
        run: "Ejecución",
        all: "Todos",
        noMatches: "Ningún elemento coincide con los filtros actuales.",
        selectItem: "Seleccione un elemento para revisar.",
        data: "Datos",
        sourceRecords: "Registros fuente",
        metrics: ["Conjuntos seleccionados", "Elementos", "Intersecciones", "Pertenencias", "Gráficos", "Elementos de revisión"],
        fields: ["Tipo", "Acción", "Fuente", "Salida"],
        types: {
          set_summary: "Resumen del conjunto",
          overlap_intersection: "Intersección",
          pair_overlap: "Solapamiento por pares",
          chart_artifact: "Gráfico",
          context_artifact: "Contexto",
          report_artifact: "Artefacto",
          review_artifact: "Artefacto de revisión",
        },
        actions: { accept: "Aceptar", reject: "Rechazar", edit: "Editar", mark_unclear: "Marcar como dudoso", request_more_documents: "Solicitar más documentos", skip: "Omitir", review: "Revisar" },
        statuses: { ready_for_review: "Listo para revisión", needs_review: "Requiere revisión", pending_review: "Revisión pendiente", reviewed: "Revisado", partial_review: "Revisado parcialmente", empty: "Vacío" },
      },
    };
    const FALLBACK = {
      widget_type: "set_overlap_review",
      review_payload: {
        run_id: "preview",
        status: "empty",
        item_count: 0,
        items: [],
        summary: {},
      },
    };
    const state = {
      payload: FALLBACK,
      selectedType: "all",
      selectedId: null,
      query: "",
    };

    function toolOutput() {
      return window.openai?.toolOutput || window.openai?.structuredContent || FALLBACK;
    }

    function esc(value) {
      return String(value ?? "").replace(/[&<>"']/g, (char) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#39;",
      })[char]);
    }

    function reviewPayload() {
      return state.payload.review_payload || FALLBACK.review_payload;
    }

    function language() {
      const value = reviewPayload().language || state.payload.run_intake?.language || "en";
      const code = String(value).trim().toLowerCase().replace("_", "-").split("-", 1)[0];
      return code === "es" ? "es" : "en";
    }

    function copy() {
      return UI_COPY[language()];
    }

    function typeLabel(value) {
      return copy().types[value] || value;
    }

    function actionLabel(value) {
      return copy().actions[value] || value;
    }

    function statusLabel(value) {
      return copy().statuses[value] || value;
    }

    function renderStaticCopy() {
      const text = copy();
      document.documentElement.lang = language();
      document.title = text.pageTitle;
      document.getElementById("page-title").textContent = text.pageTitle;
      document.getElementById("search").placeholder = text.search;
      document.getElementById("items-title").textContent = text.itemsTitle;
      document.getElementById("detail-title").textContent = text.detailTitle;
    }

    function items() {
      return Array.isArray(reviewPayload().items) ? reviewPayload().items : [];
    }

    function filteredItems() {
      const q = state.query.trim().toLowerCase();
      return items().filter((item) => {
        const typeOk = state.selectedType === "all" || item.item_type === state.selectedType;
        if (!typeOk) return false;
        if (!q) return true;
        return JSON.stringify(item).toLowerCase().includes(q);
      });
    }

    function metric(label, value) {
      return `<article class="metric"><span>${esc(label)}</span><strong>${esc(value)}</strong></article>`;
    }

    function renderSummary() {
      const payload = reviewPayload();
      const summary = payload.summary || {};
      const text = copy();
      document.getElementById("subtitle").textContent = `${text.run} ${payload.run_id || "n/a"}`;
      document.getElementById("status-pill").textContent = statusLabel(payload.status || "ready_for_review");
      document.getElementById("summary").innerHTML = [
        metric(text.metrics[0], summary.selected_set_count ?? 0),
        metric(text.metrics[1], summary.item_count ?? 0),
        metric(text.metrics[2], summary.intersection_count ?? 0),
        metric(text.metrics[3], summary.canonical_memberships ?? 0),
        metric(text.metrics[4], summary.chart_count ?? 0),
        metric(text.metrics[5], payload.item_count ?? 0),
      ].join("");
    }

    function renderTabs() {
      const counts = new Map([["all", items().length]]);
      for (const item of items()) {
        counts.set(item.item_type, (counts.get(item.item_type) || 0) + 1);
      }
      document.getElementById("tabs").innerHTML = Array.from(counts.entries()).map(([type, count]) => {
        const label = type === "all" ? copy().all : typeLabel(type);
        return `<button class="tab" data-type="${esc(type)}" aria-pressed="${type === state.selectedType}">${esc(label)} (${count})</button>`;
      }).join("");
    }

    function rowHtml(item) {
      const selected = item.id === state.selectedId ? " is-selected" : "";
      return `<button class="row${selected}" data-id="${esc(item.id)}" data-kind="${esc(item.item_type)}">
        <span class="type">${esc(typeLabel(item.item_type))}</span>
        <span>
          <span class="title">${esc(item.title)}</span>
          <span class="path">${esc(item.source_path || item.output_path || "")}</span>
        </span>
        <span class="action">${esc(actionLabel(item.recommended_action || "review"))}</span>
      </button>`;
    }

    function renderRows() {
      const rows = filteredItems();
      document.getElementById("count").textContent = `${rows.length} / ${items().length}`;
      document.getElementById("rows").innerHTML = rows.length
        ? rows.map(rowHtml).join("")
        : `<div class="empty">${esc(copy().noMatches)}</div>`;
      if (!state.selectedId && rows[0]) state.selectedId = rows[0].id;
      if (state.selectedId && !items().some((item) => item.id === state.selectedId)) {
        state.selectedId = rows[0]?.id || null;
      }
      renderDetails();
    }

    function detailsHtml(item) {
      if (!item) return `<div class="empty">${esc(copy().selectItem)}</div>`;
      const text = copy();
      const fields = [
        [text.fields[0], typeLabel(item.item_type)],
        [text.fields[1], actionLabel(item.recommended_action || "")],
        [text.fields[2], item.source_path || ""],
        [text.fields[3], item.output_path || ""],
      ].filter(([, value]) => value);
      return `
        <h3>${esc(item.title)}</h3>
        <dl>${fields.map(([key, value]) => `<dt>${esc(key)}</dt><dd>${esc(value)}</dd>`).join("")}</dl>
        <h4>${esc(text.data)}</h4>
        <pre>${esc(JSON.stringify(item.data || {}, null, 2))}</pre>
        <h4>${esc(text.sourceRecords)}</h4>
        <pre>${esc(JSON.stringify(item.source_records || [], null, 2))}</pre>
      `;
    }

    function renderDetails() {
      const item = items().find((candidate) => candidate.id === state.selectedId);
      document.getElementById("details").innerHTML = detailsHtml(item);
    }

    function render() {
      renderStaticCopy();
      renderSummary();
      renderTabs();
      renderRows();
    }

    document.getElementById("search").addEventListener("input", (event) => {
      state.query = event.target.value;
      renderRows();
    });
    document.getElementById("tabs").addEventListener("click", (event) => {
      const button = event.target.closest("button[data-type]");
      if (!button) return;
      state.selectedType = button.dataset.type;
      state.selectedId = null;
      render();
    });
    document.getElementById("rows").addEventListener("click", (event) => {
      const button = event.target.closest("button[data-id]");
      if (!button) return;
      state.selectedId = button.dataset.id;
      renderRows();
    });

    state.payload = toolOutput();
    render();
  </script>
</body>
</html>
