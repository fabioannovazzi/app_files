<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Build Report Review</title>
  <style>
    :root {
      color-scheme: light;
      --paper: #ffffff;
      --surface: #ffffff;
      --soft: #fafafa;
      --soft-strong: #f3f4f2;
      --ink: #1f2421;
      --text: #3f4541;
      --muted: #727972;
      --border: #e8eae7;
      --border-strong: #d8dcd7;
      --accent: #35463f;
      --accent-strong: #202a26;
      --accent-soft: #f3f6f4;
      --danger: #7b4b44;
      --danger-bg: #fbf7f6;
      --warning: #6f6247;
      --warning-bg: #fbfaf6;
      --ok: #4b6759;
      --ok-bg: #f7faf8;
      --info: #52646e;
      --info-bg: #f7fafb;
      --radius: 8px;
      --content: 1240px;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; max-width: 100%; background: var(--paper); }
    body {
      color: var(--text);
      font-family: "Aptos", "SF Pro Text", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 1rem;
      line-height: 1.5;
      letter-spacing: 0;
      font-kerning: normal;
      text-rendering: optimizeLegibility;
    }
    button, input, textarea { font: inherit; letter-spacing: 0; }
    button, input, textarea, select { max-width: 100%; }
    .app { min-height: 100vh; padding: 1.5rem; background: var(--paper); }
    .shell { width: 100%; max-width: var(--content); min-width: 0; margin: 0 auto; }
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 1rem;
      padding-bottom: 1rem;
      margin-bottom: 1rem;
      border-bottom: 1px solid var(--border);
    }
    h1 { margin: 0 0 0.2rem; color: var(--ink); font-size: 1.25rem; font-weight: 650; line-height: 1.18; }
    .subtitle { margin: 0; color: var(--muted); font-size: 0.9rem; }
    .top-actions, .context-list, .tabs, .action-buttons, .empty-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 0.45rem;
      min-width: 0;
    }
    .top-actions, .context-list, .tabs, .action-buttons { justify-content: flex-end; }
    .pill, .context-token, .status-token {
      display: inline-flex;
      align-items: center;
      min-width: 0;
      max-width: 100%;
      min-height: 1.7rem;
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 0.2rem 0.55rem;
      background: var(--surface);
      color: var(--muted);
      font-size: 0.74rem;
      font-weight: 600;
      line-height: 1.2;
      white-space: normal;
      overflow-wrap: anywhere;
    }
    .summary {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(8.8rem, 1fr));
      gap: 0;
      margin-bottom: 1.1rem;
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
    }
    .metric {
      min-width: 0;
      min-height: 3.9rem;
      border: 0;
      border-right: 1px solid var(--border);
      border-radius: 0;
      padding: 0.72rem 0.9rem 0.68rem 0;
      background: transparent;
    }
    .metric:last-child { border-right: 0; }
    .metric span { display: block; color: var(--muted); font-size: 0.74rem; font-weight: 560; }
    .metric strong {
      display: block;
      margin-top: 0.16rem;
      color: var(--ink);
      font-size: 1.2rem;
      font-weight: 650;
      line-height: 1.15;
      font-variant-numeric: tabular-nums;
    }
    .run-context, .review-actions {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 0.75rem;
      align-items: center;
      border: 0;
      border-bottom: 1px solid var(--border);
      border-radius: 0;
      padding: 0.78rem 0;
      margin-bottom: 1rem;
      background: transparent;
    }
    .run-context strong, .progress-meter strong {
      display: block;
      color: var(--ink);
      font-weight: 650;
      line-height: 1.25;
    }
    .run-context span, .progress-meter span {
      color: var(--muted);
      font-size: 0.84rem;
      line-height: 1.35;
      overflow-wrap: anywhere;
    }
    .review-store {
      grid-column: 1 / -1;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(10rem, 1fr));
      gap: 0;
      border-top: 1px solid var(--border);
      padding-top: 0.62rem;
      margin-top: 0.2rem;
    }
    .review-store__item {
      min-width: 0;
      border-right: 1px solid var(--border);
      padding: 0.16rem 0.7rem 0.12rem 0;
    }
    .review-store__item:last-child { border-right: 0; }
    .review-store__item span {
      display: block;
      color: var(--muted);
      font-size: 0.72rem;
      font-weight: 620;
      line-height: 1.2;
    }
    .review-store__item strong {
      display: block;
      margin-top: 0.12rem;
      color: var(--ink);
      font-size: 0.86rem;
      font-weight: 650;
      line-height: 1.25;
      overflow-wrap: anywhere;
      font-variant-numeric: tabular-nums;
    }
    .review-store__item.is-dirty strong { color: var(--warning); }
    .review-store__item.is-applied strong { color: var(--ok); }
    .review-store__item.is-empty strong { color: var(--muted); }
    .recovery-panel {
      grid-column: 1 / -1;
      display: none;
      grid-template-columns: minmax(9rem, 0.22fr) minmax(0, 1fr);
      gap: 0.6rem 0.9rem;
      align-items: start;
      border-top: 1px solid var(--border);
      padding-top: 0.68rem;
      color: var(--text);
    }
    .recovery-panel.is-visible { display: grid; }
    .recovery-panel.is-error { color: var(--danger); }
    .recovery-panel__title {
      color: var(--ink);
      font-size: 0.82rem;
      font-weight: 650;
      line-height: 1.25;
    }
    .recovery-panel.is-error .recovery-panel__title { color: var(--danger); }
    .recovery-panel__body {
      display: grid;
      gap: 0.35rem;
      min-width: 0;
      color: var(--muted);
      font-size: 0.82rem;
      line-height: 1.35;
    }
    .recovery-panel__line {
      display: grid;
      grid-template-columns: minmax(5.5rem, 0.18fr) minmax(0, 1fr);
      gap: 0.45rem;
      min-width: 0;
    }
    .recovery-panel__line span:first-child {
      color: var(--ink);
      font-weight: 620;
    }
    .recovery-panel__line span:last-child {
      min-width: 0;
      overflow-wrap: anywhere;
    }
    .data-posture {
      display: grid;
      grid-template-columns: minmax(7.5rem, auto) minmax(0, 1fr);
      gap: 0.75rem;
      align-items: start;
      border-bottom: 1px solid var(--border);
      padding: 0 0 0.9rem;
      margin-bottom: 1rem;
    }
    .data-posture__title {
      color: var(--ink);
      font-size: 0.82rem;
      font-weight: 650;
      line-height: 1.25;
    }
    .data-posture__grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(8.2rem, 1fr));
      gap: 0.45rem;
    }
    .data-posture__item {
      min-width: 0;
      border-left: 2px solid var(--border);
      padding-left: 0.55rem;
    }
    .data-posture__item span {
      display: block;
      color: var(--muted);
      font-size: 0.7rem;
      font-weight: 620;
      line-height: 1.2;
    }
    .data-posture__item strong {
      display: block;
      margin-top: 0.12rem;
      color: var(--text);
      font-size: 0.82rem;
      font-weight: 590;
      line-height: 1.25;
      overflow-wrap: anywhere;
    }
    .execution-provenance {
      display: none;
      border-bottom: 1px solid var(--border);
      padding: 0 0 0.9rem;
      margin: -0.2rem 0 1rem;
    }
    .execution-provenance.is-visible { display: grid; gap: 0.55rem; }
    .execution-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.75rem;
    }
    .execution-header h2 {
      margin: 0;
      color: var(--ink);
      font-size: 0.82rem;
      font-weight: 650;
      line-height: 1.25;
    }
    .execution-header span {
      color: var(--muted);
      font-size: 0.74rem;
      font-weight: 620;
    }
    .execution-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(15rem, 1fr));
      gap: 0.5rem;
    }
    .execution-step {
      min-width: 0;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0.68rem 0.75rem;
      background: var(--surface);
    }
    .execution-step__title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.5rem;
      color: var(--ink);
      font-size: 0.84rem;
      font-weight: 650;
      line-height: 1.25;
    }
    .execution-badge {
      flex: 0 0 auto;
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 0.1rem 0.42rem;
      color: var(--muted);
      font-size: 0.68rem;
      font-weight: 650;
    }
    .execution-badge.is-remote {
      border-color: rgba(176, 77, 67, 0.35);
      color: var(--danger);
      background: rgba(176, 77, 67, 0.08);
    }
    .execution-kv {
      display: grid;
      grid-template-columns: minmax(4.8rem, auto) minmax(0, 1fr);
      gap: 0.28rem 0.5rem;
      margin-top: 0.5rem;
      color: var(--text);
      font-size: 0.76rem;
      line-height: 1.3;
    }
    .execution-kv span:nth-child(odd) {
      color: var(--muted);
      font-weight: 620;
    }
    .execution-kv span:nth-child(even) {
      min-width: 0;
      overflow-wrap: anywhere;
    }
    .safeguards {
      display: none;
      border-bottom: 1px solid var(--border);
      padding: 0 0 0.9rem;
      margin: -0.2rem 0 1rem;
    }
    .safeguards.is-visible { display: grid; gap: 0.55rem; }
    .safeguards__header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.75rem;
    }
    .safeguards__header h2 {
      margin: 0;
      color: var(--ink);
      font-size: 0.82rem;
      font-weight: 650;
      line-height: 1.25;
    }
    .safeguards__header span {
      color: var(--muted);
      font-size: 0.74rem;
      font-weight: 620;
    }
    .safeguards__grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(11.5rem, 1fr));
      gap: 0.45rem;
    }
    .safeguard {
      min-width: 0;
      border: 1px solid var(--border);
      border-left-width: 3px;
      border-radius: var(--radius);
      padding: 0.62rem 0.7rem;
      background: var(--surface);
    }
    .safeguard.is-ok { border-left-color: var(--ok); }
    .safeguard.is-check { border-left-color: var(--info); }
    .safeguard.is-warning { border-left-color: var(--warning); }
    .safeguard.is-danger { border-left-color: var(--danger); }
    .safeguard__top {
      display: flex;
      justify-content: space-between;
      gap: 0.5rem;
      align-items: start;
    }
    .safeguard__top strong {
      min-width: 0;
      color: var(--ink);
      font-size: 0.8rem;
      font-weight: 650;
      line-height: 1.25;
      overflow-wrap: anywhere;
    }
    .safeguard__badge {
      flex: 0 0 auto;
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 0.1rem 0.38rem;
      color: var(--muted);
      font-size: 0.66rem;
      font-weight: 650;
      line-height: 1.15;
    }
    .safeguard.is-ok .safeguard__badge { color: var(--ok); }
    .safeguard.is-warning .safeguard__badge,
    .safeguard.is-danger .safeguard__badge { color: var(--danger); }
    .safeguard p {
      margin: 0.28rem 0 0;
      color: var(--muted);
      font-size: 0.76rem;
      line-height: 1.3;
      overflow-wrap: anywhere;
    }
    .progress-meter {
      display: grid;
      grid-template-columns: minmax(8rem, auto) minmax(7rem, 1fr) minmax(0, auto);
      gap: 0.45rem 0.7rem;
      align-items: center;
      min-width: 0;
    }
    .progress-rail {
      position: relative;
      width: 100%;
      min-width: 7rem;
      height: 0.28rem;
      border-radius: 999px;
      background: var(--border);
      overflow: hidden;
    }
    .progress-rail span {
      display: block;
      width: 0%;
      height: 100%;
      border-radius: inherit;
      background: var(--accent);
      transition: width 160ms ease;
    }
    .state-strip {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 0.8rem;
      align-items: center;
      border-bottom: 1px solid var(--border);
      padding: 0 0 0.9rem;
      margin-bottom: 0.85rem;
    }
    .state-filters {
      display: flex;
      flex-wrap: wrap;
      gap: 0.35rem;
      min-width: 0;
    }
    .state-chip {
      display: inline-grid;
      grid-template-columns: auto auto;
      gap: 0.38rem;
      align-items: center;
      min-height: 2rem;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0.32rem 0.52rem;
      background: var(--surface);
      color: var(--text);
      cursor: pointer;
      font-size: 0.78rem;
      line-height: 1.2;
    }
    .state-chip:hover { background: var(--soft); }
    .state-chip[aria-pressed="true"] {
      border-color: var(--border-strong);
      background: var(--accent-soft);
      color: var(--accent-strong);
      font-weight: 620;
    }
    .state-chip strong {
      color: var(--ink);
      font-size: 0.82rem;
      font-variant-numeric: tabular-nums;
    }
    .state-final {
      display: grid;
      gap: 0.08rem;
      min-width: 8rem;
      border-left: 1px solid var(--border);
      padding-left: 0.78rem;
    }
    .state-final span {
      color: var(--muted);
      font-size: 0.7rem;
      font-weight: 620;
      line-height: 1.2;
    }
    .state-final strong {
      color: var(--ink);
      font-size: 0.86rem;
      font-weight: 650;
      line-height: 1.2;
    }
    .state-final.is-blocked strong, .state-final.is-partial_review_applied strong { color: var(--danger); }
    .state-final.is-final_ready strong { color: var(--ok); }
    .button, .tab, .decision-choice {
      max-width: 100%;
      min-width: 0;
      min-height: 2.15rem;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0.42rem 0.64rem;
      background: var(--surface);
      color: var(--text);
      cursor: pointer;
      font-size: 0.86rem;
      line-height: 1.2;
      overflow-wrap: anywhere;
    }
    .button:hover, .tab:hover, .decision-choice:hover { background: var(--soft); }
    .button:disabled { cursor: not-allowed; opacity: 0.52; }
    .button.primary { border-color: var(--accent); background: var(--accent); color: #fff; font-weight: 620; }
    .button.primary:hover { background: var(--accent-strong); }
    .status-message { min-width: 0; color: var(--muted); overflow-wrap: anywhere; }
    .status-message.is-error { color: var(--danger); }
    .status-message.is-ok { color: var(--ok); }
    .toolbar {
      display: grid;
      grid-template-columns: minmax(14rem, 1fr) auto;
      gap: 0.65rem;
      align-items: start;
      margin-bottom: 0.85rem;
    }
    .search {
      width: 100%;
      min-height: 2.45rem;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0.54rem 0.7rem;
      background: var(--surface);
      color: var(--ink);
      outline: none;
    }
    .search::placeholder { color: var(--muted); }
    .tab[aria-pressed="true"], .decision-choice[aria-pressed="true"] {
      border-color: var(--border-strong);
      background: var(--accent-soft);
      color: var(--accent-strong);
      font-weight: 600;
    }
    .content {
      display: grid;
      grid-template-columns: minmax(20rem, 0.78fr) minmax(0, 1.22fr);
      gap: 0.85rem;
      align-items: start;
    }
    .panel {
      min-width: 0;
      overflow: hidden;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
    }
    .panel-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 0.75rem;
      min-height: 2.8rem;
      border-bottom: 1px solid var(--border);
      padding: 0.68rem 0.85rem;
      background: var(--surface);
      color: var(--muted);
      font-size: 0.84rem;
    }
    .panel-header h2 {
      margin: 0;
      color: var(--ink);
      font-size: 0.9rem;
      font-weight: 650;
      line-height: 1.2;
    }
    .rows { max-height: min(720px, calc(100vh - 22rem)); overflow: auto; }
    .row {
      display: grid;
      grid-template-columns: minmax(6.75rem, 0.28fr) minmax(0, 1fr) minmax(7rem, 9rem);
      gap: 0.75rem;
      width: 100%;
      min-height: 4.15rem;
      border: 0;
      border-left: 2px solid transparent;
      border-bottom: 1px solid var(--border);
      padding: 0.7rem 0.82rem 0.7rem calc(0.82rem - 2px);
      background: var(--surface);
      color: var(--text);
      text-align: left;
      cursor: pointer;
    }
    .row:hover, .row.is-selected { background: var(--soft); }
    .row.is-selected { border-left-color: var(--accent); }
    .row > span {
      min-width: 0;
      max-width: 100%;
    }
    .row > span:last-child {
      display: flex;
      min-width: 0;
      max-width: 100%;
      flex-direction: column;
      align-items: flex-start;
    }
    .type { color: var(--muted); font-size: 0.78rem; line-height: 1.25; overflow-wrap: anywhere; }
    .title { color: var(--ink); font-weight: 650; line-height: 1.3; overflow-wrap: anywhere; word-break: break-word; }
    .row-support {
      display: block;
      margin-top: 0.22rem;
      color: var(--muted);
      font-size: 0.78rem;
      line-height: 1.35;
      overflow-wrap: anywhere;
      word-break: break-word;
    }
    .action {
      display: inline-flex;
      min-width: 0;
      max-width: 9rem;
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 0.2rem 0.48rem;
      background: var(--surface);
      color: var(--warning);
      font-size: 0.72rem;
      font-weight: 600;
      line-height: 1.2;
      text-align: center;
      overflow-wrap: anywhere;
      white-space: normal;
    }
    .row-status {
      display: flex;
      flex-wrap: wrap;
      gap: 0.35rem;
      align-items: center;
      margin-top: 0.28rem;
      color: var(--muted);
      font-size: 0.76rem;
      line-height: 1.25;
    }
    .row-status::before {
      content: "";
      width: 0.42rem;
      height: 0.42rem;
      border-radius: 999px;
      background: var(--warning);
    }
    .row-status.is-ready::before, .row-status.is-accepted::before, .row-status.is-reviewed::before { background: var(--ok); }
    .row-status.is-needs_evidence::before, .row-status.is-rejected::before, .row-status.is-blocked::before { background: var(--danger); }
    .row-status.is-edited::before { background: var(--info); }
    .action--accept, .action--accepted { background: var(--surface); color: var(--ok); }
    .action--mark_unclear, .action--request_more_documents, .action--reject, .action--rejected, .action--needs_evidence {
      background: var(--surface);
      color: var(--danger);
    }
    .action--edit, .action--edited { background: var(--surface); color: var(--info); }
    .details { padding: 1rem; }
    .review-heading {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 0.8rem;
      align-items: start;
      padding-bottom: 0.85rem;
      border-bottom: 1px solid var(--border);
    }
    .review-heading > div { min-width: 0; }
    .review-heading h3 { margin: 0 0 0.25rem; color: var(--ink); font-size: 1.05rem; line-height: 1.25; overflow-wrap: anywhere; word-break: break-word; }
    .review-heading p { margin: 0; color: var(--muted); font-size: 0.86rem; line-height: 1.4; overflow-wrap: anywhere; word-break: break-word; }
    .details dl {
      display: grid;
      grid-template-columns: minmax(7.5rem, 0.32fr) minmax(0, 1fr);
      gap: 0.42rem 0.75rem;
      margin: 0.85rem 0;
    }
    .details dt { color: var(--muted); font-size: 0.8rem; line-height: 1.3; }
    .details dd { margin: 0; color: var(--text); overflow-wrap: anywhere; }
    .decision-box {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0.75rem;
      margin: 0.85rem 0;
      background: var(--surface);
    }
    .decision-grid { display: flex; flex-wrap: wrap; gap: 0.42rem; margin-bottom: 0.65rem; }
    .decision-impact {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 0.72rem;
      background: var(--soft);
      overflow: hidden;
    }
    .decision-impact__title {
      padding: 0.56rem 0.68rem;
      border-bottom: 1px solid var(--border);
      color: var(--ink);
      font-size: 0.82rem;
      font-weight: 650;
      line-height: 1.25;
    }
    .decision-impact__grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(12rem, 1fr));
      gap: 0;
    }
    .decision-impact__item {
      display: grid;
      gap: 0.16rem;
      min-width: 0;
      padding: 0.58rem 0.68rem;
      border-right: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
    }
    .decision-impact__item span {
      color: var(--muted);
      font-size: 0.72rem;
      font-weight: 620;
      line-height: 1.2;
    }

        return { item_id: decision.item_id, item_type: item?.item_type || "", title: item?.title || "", action: decision.action, status: ACTION_STATUSES[decision.action] || "reviewed", decided_at: now, ...(decision.reviewer_note ? { reviewer_note: decision.reviewer_note } : {}), ...(decision.edit_value ? { edit_value: decision.edit_value } : {}), ...(decision.requested_documents?.length ? { requested_documents: decision.requested_documents } : {}) };

      return { schema_version: payload.schema_version || "1.0", plugin: payload.plugin || CONFIG.plugin, workflow: payload.workflow || CONFIG.plugin, run_id: payload.run_id || "preview", decided_at: decisions.length ? now : null, decision_source: "mcp_widget_export", review_payload_path: state.payload.ui_decisions?.review_payload_path || "review_payload.json", decisions, decision_count: decisions.length, item_count: items().length, status: decisions.length === 0 ? "pending_review" : decisions.length === items().length ? "reviewed" : "partial_review" };
    }
    function saveToolArgs() {
      return {
        run_intake: state.payload.run_intake || null,
        review_payload: reviewPayload(),
        ui_decisions: state.payload.ui_decisions || null,
        decisions: collectDecisionInputs(),
        decision_source: "mcp_widget",
      };
    }
    function applyToolArgs() {
      return {
        run_intake: state.payload.run_intake || null,
        review_payload: reviewPayload(),
        ui_decisions: state.payload.ui_decisions || null,
        final_artifacts: state.payload.final_artifacts || null,
        decisions: collectDecisionInputs(),
        decision_source: "mcp_widget",
      };
    }
    function parseToolResult(result) {
      if (result?.structuredContent) return result.structuredContent;
      if (result?.ui_decisions || result?.ok != null) return result;
      const text = Array.isArray(result?.content) ? result.content.find((entry) => entry?.text)?.text : null;
      if (text) {
        try { return JSON.parse(text); } catch { return { ok: false, error: text }; }
      }
      return result || {};
    }
    async function copyText(text) {
      if (navigator.clipboard?.writeText) { await navigator.clipboard.writeText(text); return; }
      const textarea = document.createElement("textarea");
      textarea.value = text; textarea.setAttribute("readonly", ""); textarea.style.position = "fixed"; textarea.style.opacity = "0";
      document.body.appendChild(textarea); textarea.select(); document.execCommand("copy"); textarea.remove();
    }
    async function copyDecisionJson() { await copyText(`${JSON.stringify(fallbackUiDecisions(), null, 2)}\n`); }
    function setSaveStatus(message, kind = "") {
      const node = document.getElementById("save-status");
      node.textContent = message || "";
      node.className = `status-message${kind ? ` is-${kind}` : ""}`;
    }
    async function saveCurrentDecisions() {
      const saveTool = state.payload.decision_policy?.save_tool || CONFIG.saveTool;
      if (typeof window.openai?.callTool !== "function") {
        await copyDecisionJson();
        setRecoveryIssue("fallback", uiText("fallbackActive", "JSON fallback active"), uiText("fallbackBody", "Copy or download ui_decisions.json. Use the MCP or local-server review surface to persist and apply decisions."), saveTool);
        return { ok: true, copied: true, message: uiText("toolCopied", "Tool bridge unavailable. JSON copied.") };
      }
      const result = parseToolResult(await window.openai.callTool(saveTool, saveToolArgs()));
      if (!result?.ok) throw new Error(result?.error || uiText("saveFailed", "Decision save failed."));
      if (result.ui_decisions) state.payload.ui_decisions = result.ui_decisions;
      return result;
    }
    async function handleSaveDecisions() {
      const decisions = collectDecisionInputs();
      try { validateDecisionInputs(decisions); } catch (error) { setSaveStatus(error.message || String(error), "error"); return; }
      setSaveStatus(uiText("saving", "Saving..."));
      try {
        const result = await saveCurrentDecisions();
        if (!result.copied) clearRecoveryIssue();
        setSaveStatus(result.message || uiText("decisionsSaved", "Decisions saved."), "ok");
        renderProgress();
      } catch (error) {
        setRecoveryIssue("error", uiText("saveFailedTitle", "Save did not persist"), uiText("retryWithMcp", "Retry from the MCP or local-server review surface, or copy/download decision JSON for handoff."), state.payload.decision_policy?.save_tool || CONFIG.saveTool, error.message || String(error));
        setSaveStatus(error.message || String(error), "error");
      }
    }
    async function handleApplyDecisions() {
      const decisions = collectDecisionInputs();
      try { validateDecisionInputs(decisions); } catch (error) { setSaveStatus(error.message || String(error), "error"); return; }
      if (typeof window.openai?.callTool !== "function") {
        try {
          await copyDecisionJson();
          setRecoveryIssue("fallback", uiText("applyFailedTitle", "Apply did not persist"), uiText("applyRequiresMcp", "Apply requires the MCP or local-server review surface."), state.payload.decision_policy?.apply_tool || CONFIG.applyTool);
          setSaveStatus(uiText("toolCopiedApply", "Tool bridge unavailable. JSON copied; apply requires MCP."), "ok");
        } catch (error) {
          setRecoveryIssue("error", uiText("applyFailedTitle", "Apply did not persist"), uiText("retryWithMcp", "Retry from the MCP or local-server review surface, or copy/download decision JSON for handoff."), state.payload.decision_policy?.apply_tool || CONFIG.applyTool, error.message || String(error));
          setSaveStatus(error.message || String(error), "error");
        }
        return;
      }
      setSaveStatus(uiText("savingApplying", "Saving and applying..."));
      try {
        await saveCurrentDecisions();
        const applyTool = state.payload.decision_policy?.apply_tool || CONFIG.applyTool;
        const result = parseToolResult(await window.openai.callTool(applyTool, applyToolArgs()));
        if (!result?.ok) throw new Error(result?.error || uiText("applyFailed", "Decision apply failed."));
        if (result.final_artifacts) state.payload.final_artifacts = result.final_artifacts;
        if (result.applied_decisions) state.payload.applied_decisions = result.applied_decisions;
        clearRecoveryIssue();
        setSaveStatus(result.message || uiText("decisionsApplied", "Decisions applied."), "ok");
        render();
      } catch (error) {
        setRecoveryIssue("error", uiText("applyFailedTitle", "Apply did not persist"), uiText("retryWithMcp", "Retry from the MCP or local-server review surface, or copy/download decision JSON for handoff."), state.payload.decision_policy?.apply_tool || CONFIG.applyTool, error.message || String(error));
        setSaveStatus(error.message || String(error), "error");
      }
    }
    function downloadDecisionJson() {
      const blob = new Blob([`${JSON.stringify(fallbackUiDecisions(), null, 2)}\n`], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const anchor = document.createElement("a");
      anchor.href = url; anchor.download = "ui_decisions.json"; document.body.appendChild(anchor); anchor.click(); anchor.remove(); URL.revokeObjectURL(url);
      setSaveStatus(uiText("jsonDownloaded", "JSON downloaded."), "ok");
    }
    function applyRecommendedToVisible() { for (const item of filteredItems()) ensureDecision(item, item.recommended_action || item.allowed_actions?.[0] || "mark_unclear"); persistWidgetState(); renderRows(); }
    function persistWidgetState() {
      try { window.openai?.setWidgetState?.({ run_id: reviewPayload().run_id || null, decisions: state.decisions }); } catch { }
    }
    function loadInitialDecisions() {
      const current = {};
      let savedDecisionCount = 0;
      for (const decision of (Array.isArray(state.payload.ui_decisions?.decisions) ? state.payload.ui_decisions.decisions : [])) {
        if (decision?.item_id && decision?.action && itemById(decision.item_id)) {
          current[decision.item_id] = { item_id: decision.item_id, action: decision.action, reviewer_note: decision.reviewer_note || "", edit_value: decision.edit_value || "", requested_documents: Array.isArray(decision.requested_documents) ? decision.requested_documents : [] };
          savedDecisionCount += 1;
        }
      }
      const widgetState = window.openai?.widgetState;
      let draftDecisionCount = 0;
      if (widgetState?.run_id === reviewPayload().run_id && widgetState.decisions && typeof widgetState.decisions === "object") {
        for (const [itemId, decision] of Object.entries(widgetState.decisions)) if (itemById(itemId) && decision?.action) {
          current[itemId] = decision;
          draftDecisionCount += 1;
        }
      }
      state.decisions = current;
      state.recovery = { savedDecisionCount, draftDecisionCount };
    }
    function setButtonText(id, text) {
      const button = document.getElementById(id);
      if (button) button.textContent = text;
    }
    function renderChrome() {
      const lang = activeLanguage();
      const title = workflowText("title", CONFIG.title);
      document.documentElement.lang = lang;
      document.title = title;
      document.getElementById("app-title").textContent = title;
      document.getElementById("status-pill").textContent = uiText("mcpWidget", "MCP widget");
      setButtonText("use-recommended", ui("buttons", "useRecommended", "Use recommended"));
      setButtonText("save-decisions", ui("buttons", "saveDecisions", "Save decisions"));
      setButtonText("apply-decisions", ui("buttons", "applyDecisions", "Apply decisions"));
      setButtonText("copy-decisions", ui("buttons", "copyJson", "Copy JSON"));
      setButtonText("download-decisions", ui("buttons", "downloadJson", "Download JSON"));
      document.getElementById("search").placeholder = workflowText("search", "Search section, table, source, blocker, artifact");
      document.getElementById("queue-title").textContent = workflowText("queueTitle", uiText("reviewQueue", "Review queue"));
      document.getElementById("detail-title").textContent = workflowText("detailTitle", uiText("evidenceDecision", "Evidence and decision"));
    }
    function loadDemoPayload() { state.payload = DEMO_PAYLOAD; state.selectedType = "all"; state.selectedState = "all"; state.selectedId = null; state.query = ""; document.getElementById("search").value = ""; loadInitialDecisions(); setSaveStatus(uiText("sampleLoaded", "Sample review loaded."), "ok"); render(); }
    function render() {
      renderChrome();
      renderSummary(); renderContext(); renderDataPosture(); renderExecutionProvenance(); renderReviewSafeguards(); renderTabs(); renderRows(); renderProgress(); renderArtifacts();
    }
    document.getElementById("search").addEventListener("input", (event) => { state.query = event.target.value; renderRows(); });
    document.getElementById("tabs").addEventListener("click", (event) => { const button = event.target.closest("button[data-type]"); if (!button) return; state.selectedType = button.dataset.type; state.selectedId = null; render(); });
    document.getElementById("state-strip").addEventListener("click", (event) => { const button = event.target.closest("button[data-state-filter]"); if (!button) return; state.selectedState = button.dataset.stateFilter; state.selectedId = null; render(); });
    document.getElementById("rows").addEventListener("click", (event) => {
      const demoButton = event.target.closest("button[data-load-demo]"); if (demoButton) { loadDemoPayload(); return; }
      const emptyButton = event.target.closest("#copy-empty-contract"); if (emptyButton) { copyDecisionJson().then(() => setSaveStatus(uiText("emptyJsonCopied", "Empty decision JSON copied."), "ok")).catch((error) => setSaveStatus(error.message || String(error), "error")); return; }
      const button = event.target.closest("button[data-id]"); if (!button) return; state.selectedId = button.dataset.id; renderRows();
    });
    document.getElementById("details").addEventListener("click", (event) => { const button = event.target.closest("button[data-decision-action]"); if (!button) return; setDecisionAction(itemById(state.selectedId), button.dataset.decisionAction); });
    document.getElementById("details").addEventListener("input", (event) => { const field = event.target.closest("[data-decision-field]"); if (!field) return; setDecisionField(itemById(state.selectedId), field.dataset.decisionField, field.value); });
    document.getElementById("use-recommended").addEventListener("click", applyRecommendedToVisible);
    document.getElementById("save-decisions").addEventListener("click", handleSaveDecisions);
    document.getElementById("apply-decisions").addEventListener("click", handleApplyDecisions);
    document.getElementById("copy-decisions").addEventListener("click", () => copyDecisionJson().then(() => setSaveStatus(uiText("jsonCopied", "JSON copied."), "ok")).catch((error) => setSaveStatus(error.message || String(error), "error")));
    document.getElementById("download-decisions").addEventListener("click", downloadDecisionJson);
    state.payload = toolOutput();
    loadInitialDecisions();
    render();
  </script>
</body>
</html>
