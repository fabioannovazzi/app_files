repos:
  - repo: https://github.com/psf/black
    rev: 25.1.0
    hooks:
      - id: black
        exclude: modules/charting/draw_waterfall.py
  - repo: https://github.com/pycqa/isort
    rev: 6.0.1
    hooks:
      - id: isort
        exclude: modules/charting/draw_waterfall.py
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.16.1
    hooks:
      - id: mypy
        exclude: tools/
  - repo: https://github.com/PyCQA/bandit
    rev: 1.8.6
    hooks:
      - id: bandit
        args: [-r, src/]
        pass_filenames: false
  # Prevent pandas idioms from creeping back in
  - repo: local
    hooks:
      - id: gitleaks-staged
        name: "Scan staged changes for secrets"
        entry: gitleaks git --staged --redact --no-banner
        language: system
        pass_filenames: false
      - id: no-len-df-modules
        name: "Forbid len(df usage"
        entry: bash -c 'if grep -R -n "len(df" modules src ui tests; then echo "Use get_row_count instead of len(df)"; exit 1; fi'
        language: system
        pass_filenames: false
      - id: no-shape-df-modules
        name: "Forbid df.shape[0] usage"
        entry: bash -c 'if grep -R -n "shape\[0\]" modules src ui tests; then echo "Use get_row_count instead of df.shape[0]"; exit 1; fi'
        language: system
        pass_filenames: false
      - id: no-len-df-columns
        name: "Forbid len(df.columns) usage"
        entry: bash -c 'if grep -R -n "len(.*\.columns" modules src ui tests; then echo "Use df.width instead of len(df.columns)"; exit 1; fi'
        language: system
        pass_filenames: false
      - id: no-streaming-true
        name: "Forbid streaming=True usage"
        entry: bash -c 'if grep -R -n "streaming=True" modules src ui tests; then echo "Polars streaming mode is no longer required"; exit 1; fi'
        language: system
        pass_filenames: false
      - id: no-pandas-import
        name: "Forbid pandas usage"
        entry: python scripts/check_no_pandas_usage.py
        language: system
        pass_filenames: false
