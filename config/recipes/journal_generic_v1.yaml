name: journal_generic_v1
drop_rules:
  drop_repeated_headers: true
  drop_page_totals_by_sum: true
  drop_carry_forward_by_repeat: true

shapes:
  date_token: "\\b\\d{1,2}[./-]\\d{1,2}[./-]\\d{2,4}\\b"
  account_code: "\\d+(?:\\s*[\\/-\\.]\\s*\\d+){1,3}"
  amount: "\\d{1,3}(?:[.,]\\d{3})*[.,]\\d{2}"

# Generic header/detail regexes use named groups with neutral field names.
entry_header_regex: "^\\s*(?P<entry_date>\\d{1,2}[./-]\\d{1,2}[./-]\\d{2,4})\\s+(?P<entry_label>.+?)\\s+(?P<unit>.+?)\\s+(?P<location>.+?)\\s*$"

detail_regex: "^\\s*(?P<line_no>\\d+)\\s+(?P<account_code>\\d+(?:\\s*[\\/-\\.]\\s*\\d+){1,3})\\s+(?P<account_desc>.+?)\\s+(?P<memo>.*?)(?P<debit>\\d{1,3}(?:[.,]\\d{3})*[.,]\\d{2})?\\s*(?P<credit>\\d{1,3}(?:[.,]\\d{3})*[.,]\\d{2})?\\s*$"

number_format:
  infer: true
  decimal_candidates: [",", "."]
  thousands_candidates: [".", ",", " "]

date_formats: ["dd/MM/yyyy", "MM/dd/yyyy", "yyyy-MM-dd"]

# Optional fixed-width slicing for very rigid layouts:
column_bounds: []
table_area: []
